<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Despacho Familiar Mérida - Diagnóstico Legal</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Configuración personalizada de Tailwind -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#114363',
          }
        }
      }
    }
  </script>

  <!-- React y ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel para procesar JSX en el navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Efectos personalizados suaves */
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    .slide-up { animation: slideUp 0.5s ease-out; }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Componentes de Iconos SVG (Reemplazando lucide-react para un archivo único)
    const Icon = ({ children, className = "w-6 h-6" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        {children}
      </svg>
    );

    const Shield = ({className}) => <Icon className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></Icon>;
    const Scale = ({className}) => <Icon className={className}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></Icon>;
    const Clock = ({className}) => <Icon className={className}><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></Icon>;
    const Heart = ({className}) => <Icon className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></Icon>;
    const ChevronRight = ({className}) => <Icon className={className}><path d="m9 18 6-6-6-6"/></Icon>;
    const CheckCircle = ({className}) => <Icon className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></Icon>;
    const Lock = ({className}) => <Icon className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;
    const Award = ({className}) => <Icon className={className}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></Icon>;
    const ArrowRight = ({className}) => <Icon className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Icon>;
    const FileText = ({className}) => <Icon className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></Icon>;
    const UserCheck = ({className}) => <Icon className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></Icon>;

    function App() {
      const [quizStep, setQuizStep] = useState(0);
      const [quizAnswers, setQuizAnswers] = useState({});
      const [isCalculating, setIsCalculating] = useState(false);

      const quizQuestions = [
        {
          id: 'tipo_caso',
          question: '¿Qué tipo de situación legal familiar enfrenta actualmente?',
          options: ['Divorcio / Separación', 'Custodia de Menores', 'Pensión Alimenticia', 'Sucesión / Herencia', 'Otro']
        },
        {
          id: 'situacion',
          question: '¿Cómo describiría la relación actual con la otra parte?',
          options: ['Acuerdo Mutuo (Pacífica)', 'Conflicto Moderado', 'Alta Tensión / Bloqueo Total']
        },
        {
          id: 'urgencia',
          question: '¿Qué nivel de urgencia tiene para resolver esta situación?',
          options: ['Inmediata (Esta semana)', 'A corto plazo (1-3 meses)', 'Solo estoy explorando mis opciones']
        },
        {
          id: 'hijos',
          question: '¿Hay hijos menores de edad involucrados en el proceso?',
          options: ['Sí', 'No']
        },
        {
          id: 'preocupacion',
          question: '¿Cuál es su preocupación principal en este momento?',
          options: ['Proteger mi patrimonio', 'La tranquilidad y bienestar de mis hijos', 'El tiempo que tomará el proceso', 'Los costos legales ocultos']
        }
      ];

      const handleAnswer = (questionId, answer) => {
        setQuizAnswers(prev => ({ ...prev, [questionId]: answer }));
        
        if (quizStep < quizQuestions.length) {
          setQuizStep(prev => prev + 1);
        } else {
          setIsCalculating(true);
          setTimeout(() => {
            setIsCalculating(false);
            setQuizStep(prev => prev + 1);
          }, 2000);
        }
      };

      const startQuiz = () => setQuizStep(1);

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans selection:bg-navy selection:text-white">
          
          {/* HEADER / HERO SECTION */}
          <header className="bg-navy text-white pt-16 pb-24 px-4 relative overflow-hidden">
            <div className="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] mix-blend-overlay"></div>
            <div className="max-w-4xl mx-auto relative z-10 text-center">
              <div className="inline-flex items-center justify-center gap-2 px-4 py-2 bg-white/10 rounded-full text-sm font-medium tracking-wide mb-8 border border-white/20">
                <Lock className="w-4 h-4 text-emerald-400" />
                <span>100% Confidencial | Secreto Profesional Médico-Legal</span>
              </div>
              
              <h1 className="text-4xl md:text-6xl font-serif font-bold leading-tight mb-6 text-white drop-shadow-md">
                Proteja su Futuro y el de sus Hijos <span className="text-emerald-400 italic">sin ir a la Guerra.</span>
              </h1>
              
              <p className="text-lg md:text-xl text-slate-200 mb-10 max-w-2xl mx-auto font-light leading-relaxed">
                Abogado especialista en Derecho Familiar en Mérida. Resolvemos divorcios, custodias y pensiones mediante estrategias inteligentes en los Juzgados de Yucatán que priorizan su paz mental y resguardan su patrimonio.
              </p>
              
              <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
                <button 
                  onClick={() => document.getElementById('diagnostic').scrollIntoView({ behavior: 'smooth' })}
                  className="w-full sm:w-auto px-8 py-4 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold rounded-lg shadow-lg hover:shadow-emerald-500/30 transition-all duration-300 flex items-center justify-center gap-2 text-lg"
                >
                  Iniciar mi Diagnóstico Privado <ArrowRight className="w-5 h-5" />
                </button>
              </div>
            </div>
          </header>

          {/* VALUE EQUATION SECTION (The Peace of Mind Framework) */}
          <section className="py-16 px-4 bg-white border-b border-slate-200">
            <div className="max-w-5xl mx-auto">
              <div className="text-center mb-12">
                <h2 className="text-3xl font-serif font-bold text-navy mb-4">La Diferencia de un Abogado Estratega</h2>
                <p className="text-slate-600 max-w-2xl mx-auto">Nuestro enfoque no es destruir a la contraparte, es blindar su futuro legal minimizando el desgaste emocional y económico.</p>
              </div>
              
              <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
                <div className="bg-slate-50 p-6 rounded-xl border border-slate-100 hover:shadow-md transition-shadow">
                  <div className="w-12 h-12 bg-blue-100 text-blue-700 rounded-lg flex items-center justify-center mb-4">
                    <Scale className="w-6 h-6" />
                  </div>
                  <h3 className="font-bold text-lg mb-2 text-slate-800">Certeza Jurídica</h3>
                  <p className="text-slate-600 text-sm">Especialidad comprobada en el Código de Familia de Yucatán. No hay lugar a improvisaciones.</p>
                </div>
                <div className="bg-slate-50 p-6 rounded-xl border border-slate-100 hover:shadow-md transition-shadow">
                  <div className="w-12 h-12 bg-emerald-100 text-emerald-700 rounded-lg flex items-center justify-center mb-4">
                    <Shield className="w-6 h-6" />
                  </div>
                  <h3 className="font-bold text-lg mb-2 text-slate-800">Protección Superior</h3>
                  <p className="text-slate-600 text-sm">Prioridad absoluta al Interés Superior del Menor y a la protección íntegra de su patrimonio.</p>
                </div>
                <div className="bg-slate-50 p-6 rounded-xl border border-slate-100 hover:shadow-md transition-shadow">
                  <div className="w-12 h-12 bg-amber-100 text-amber-700 rounded-lg flex items-center justify-center mb-4">
                    <Clock className="w-6 h-6" />
                  </div>
                  <h3 className="font-bold text-lg mb-2 text-slate-800">Tiempos Reducidos</h3>
                  <p className="text-slate-600 text-sm">Estrategias de mediación que pueden reducir los tiempos de los juicios hasta en un 50%.</p>
                </div>
                <div className="bg-slate-50 p-6 rounded-xl border border-slate-100 hover:shadow-md transition-shadow">
                  <div className="w-12 h-12 bg-purple-100 text-purple-700 rounded-lg flex items-center justify-center mb-4">
                    <Heart className="w-6 h-6" />
                  </div>
                  <h3 className="font-bold text-lg mb-2 text-slate-800">Desgaste Mínimo</h3>
                  <p className="text-slate-600 text-sm">Gestión integral de trámites. Usted se enfoca en su paz emocional, nosotros en el papeleo.</p>
                </div>
              </div>
            </div>
          </section>

          {/* INTERACTIVE DIAGNOSTIC QUIZ (The Lead Magnet) */}
          <section id="diagnostic" className="py-20 px-4 bg-slate-100">
            <div className="max-w-3xl mx-auto">
              <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
                
                {/* Quiz Header */}
                <div className="bg-navy p-6 text-white text-center">
                  <h2 className="text-2xl font-serif font-bold mb-2">Evaluación de Estado Legal Familiar</h2>
                  <p className="text-blue-100 text-sm">Descubra su Nivel de Riesgo Legal en menos de 60 Segundos. Sus respuestas son estrictamente confidenciales.</p>
                </div>

                {/* Quiz Content */}
                <div className="p-8 min-h-[400px] flex flex-col justify-center">
                  {quizStep === 0 && (
                    <div className="text-center py-8 fade-in">
                      <div className="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
                        <FileText className="w-10 h-10 text-navy" />
                      </div>
                      <h3 className="text-xl font-bold mb-4 text-slate-800">¿No sabe por dónde empezar su proceso legal?</h3>
                      <p className="text-slate-600 mb-8 max-w-md mx-auto">
                        Complete este breve cuestionario anónimo para entender su posición actual ante la ley de Yucatán y determinar el mejor camino a seguir.
                      </p>
                      <button 
                        onClick={startQuiz}
                        className="px-8 py-3 bg-navy text-white font-semibold rounded-lg hover:bg-blue-900 transition-colors shadow-md"
                      >
                        Comenzar Evaluación
                      </button>
                    </div>
                  )}

                  {quizStep > 0 && quizStep <= quizQuestions.length && (
                    <div className="slide-up w-full">
                      <div className="mb-8">
                        <div className="flex justify-between text-xs font-semibold text-slate-400 mb-2">
                          <span>Pregunta {quizStep} de {quizQuestions.length}</span>
                          <span>{Math.round((quizStep / quizQuestions.length) * 100)}% Completado</span>
                        </div>
                        <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                          <div 
                            className="bg-navy h-full transition-all duration-500 ease-out"
                            style={{ width: `${(quizStep / quizQuestions.length) * 100}%` }}
                          ></div>
                        </div>
                      </div>

                      <h3 className="text-2xl font-serif font-semibold text-navy mb-6">
                        {quizQuestions[quizStep - 1].question}
                      </h3>

                      <div className="space-y-3">
                        {quizQuestions[quizStep - 1].options.map((option, index) => (
                          <button
                            key={index}
                            onClick={() => handleAnswer(quizQuestions[quizStep - 1].id, option)}
                            className="w-full text-left p-4 rounded-lg border-2 border-slate-100 hover:border-navy hover:bg-blue-50 transition-all font-medium text-slate-700 flex justify-between items-center group"
                          >
                            {option}
                            <ChevronRight className="w-5 h-5 text-slate-300 group-hover:text-navy" />
                          </button>
                        ))}
                      </div>
                    </div>
                  )}

                  {isCalculating && (
                    <div className="text-center py-16 fade-in">
                      <div className="w-16 h-16 border-4 border-slate-200 border-t-navy rounded-full animate-spin mx-auto mb-6"></div>
                      <h3 className="text-xl font-bold text-navy mb-2">Analizando su situación...</h3>
                      <p className="text-slate-500">Cruzando sus respuestas con el marco legal de Yucatán.</p>
                    </div>
                  )}

                  {quizStep > quizQuestions.length && !isCalculating && (
                    <div className="text-center py-8 fade-in">
                      <div className="inline-flex items-center justify-center w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full mb-6">
                        <Shield className="w-10 h-10" />
                      </div>
                      <h3 className="text-2xl font-serif font-bold text-slate-800 mb-2">Análisis Completado</h3>
                      
                      <div className="bg-slate-50 border border-slate-200 rounded-xl p-6 mb-8 text-left max-w-md mx-auto">
                        <p className="text-sm text-slate-500 uppercase tracking-wider font-bold mb-1">Diagnóstico Preliminar</p>
                        <p className="text-lg font-medium text-navy mb-4">Nivel de Protección Necesario: <span className="text-red-600 font-bold">ALTO</span></p>
                        <p className="text-slate-600 text-sm">
                          Basado en sus respuestas, su caso requiere una estrategia legal estructurada para prevenir pérdidas patrimoniales y asegurar acuerdos justos antes de que el conflicto escale en tribunales.
                        </p>
                      </div>

                      <p className="text-slate-700 font-medium mb-6">
                        El siguiente paso es trazar su ruta legal exacta.
                      </p>
                      
                      <button 
                        onClick={() => document.getElementById('offer').scrollIntoView({ behavior: 'smooth' })}
                        className="w-full sm:w-auto px-8 py-4 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold rounded-lg shadow-lg transition-colors flex items-center justify-center gap-2 mx-auto"
                      >
                        Ver Propuesta Estratégica <ArrowRight className="w-5 h-5" />
                      </button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </section>

          {/* THE GRAND SLAM OFFER (Strategy Stack) */}
          <section id="offer" className="py-20 px-4 bg-white">
            <div className="max-w-5xl mx-auto">
              <div className="text-center mb-16">
                <h2 className="text-3xl md:text-4xl font-serif font-bold text-navy mb-4">Sesión de Estrategia Familiar Blindada</h2>
                <p className="text-lg text-slate-600 max-w-2xl mx-auto">No contrate a un abogado a ciegas. Tenga un plan maestro antes de iniciar cualquier trámite legal. Esto es lo que obtiene al sentarse con nosotros:</p>
              </div>

              <div className="flex flex-col lg:flex-row gap-8 items-center">
                
                {/* The Stack */}
                <div className="w-full lg:w-3/5 space-y-4">
                  {[
                    { title: 'Análisis de Caso Exhaustivo', desc: 'Revisión profunda de su situación bajo los criterios de los juzgados de Mérida.', value: '$3,000 MXN' },
                    { title: 'Auditoría de Activos y Patrimonio', desc: 'Estrategia para evitar la ocultación o pérdida injusta de bienes conyugales.', value: '$4,000 MXN' },
                    { title: 'Plan de Custodia y Bienestar', desc: 'Diseño de un convenio que protege la estabilidad psicológica de los menores.', value: '$2,500 MXN' },
                    { title: 'Hoja de Ruta Legal (Paso a Paso)', desc: 'Documento claro con tiempos, requisitos y expectativas realistas de su juicio.', value: '$2,500 MXN' }
                  ].map((item, i) => (
                    <div key={i} className="flex items-start gap-4 p-5 bg-slate-50 border border-slate-200 rounded-xl hover:border-navy transition-colors">
                      <div className="mt-1 bg-emerald-100 rounded-full p-1">
                        <CheckCircle className="w-5 h-5 text-emerald-600" />
                      </div>
                      <div className="flex-1">
                        <h4 className="font-bold text-slate-800 text-lg">{item.title}</h4>
                        <p className="text-slate-600 text-sm mt-1">{item.desc}</p>
                      </div>
                      <div className="hidden sm:block text-right">
                        <span className="text-sm text-slate-400 font-medium">Valor:</span>
                        <p className="font-bold text-slate-700">{item.value}</p>
                      </div>
                    </div>
                  ))}
                </div>

                {/* The Price Box */}
                <div className="w-full lg:w-2/5">
                  <div className="bg-navy rounded-2xl shadow-2xl p-8 text-center text-white relative overflow-hidden">
                    <div className="absolute top-0 right-0 p-4 opacity-10">
                      <Award className="w-32 h-32" />
                    </div>
                    <h3 className="text-2xl font-serif font-bold mb-6 relative z-10">Resumen de Inversión</h3>
                    
                    <div className="space-y-2 mb-8 relative z-10">
                      <p className="text-blue-200">Valor Total Real:</p>
                      <p className="text-3xl font-bold text-slate-400 line-through decoration-red-500 decoration-4">$12,000 MXN</p>
                    </div>

                    <div className="bg-white/10 rounded-xl p-6 mb-8 backdrop-blur-sm border border-white/20 relative z-10">
                      <p className="text-sm font-medium tracking-wider uppercase text-emerald-300 mb-2">Costo de Apertura Preferencial</p>
                      <p className="text-5xl font-bold text-white mb-2">$1,200 <span className="text-xl font-medium">MXN</span></p>
                      <p className="text-sm text-blue-100">Pago único. Sin compromisos ocultos.</p>
                    </div>

                    <button className="w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold rounded-lg shadow-lg transition-colors text-lg relative z-10">
                      Agendar Mi Sesión Ahora
                    </button>
                    <p className="text-xs text-blue-200 mt-4 relative z-10 flex items-center justify-center gap-1">
                      <Lock className="w-3 h-3" /> Transacción segura y protegida
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* AUTHORITY & TRUST */}
          <section className="py-16 px-4 bg-slate-50 border-t border-slate-200">
            <div className="max-w-4xl mx-auto text-center">
              <h2 className="text-2xl font-bold text-slate-800 mb-8">Por qué familias en Mérida confían en nosotros</h2>
              
              <div className="grid md:grid-cols-3 gap-6 mb-12">
                <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                  <UserCheck className="w-8 h-8 text-navy mx-auto mb-3" />
                  <h4 className="font-bold mb-2">Especialidad Local</h4>
                  <p className="text-sm text-slate-600">Conocimiento íntimo de los criterios en los Juzgados Familiares del Estado de Yucatán.</p>
                </div>
                <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                  <Shield className="w-8 h-8 text-navy mx-auto mb-3" />
                  <h4 className="font-bold mb-2">Legalidad y Ética</h4>
                  <p className="text-sm text-slate-600">Cédula Profesional visible ante la SEP. Ejercicio basado en estricta confidencialidad.</p>
                </div>
                <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                  <Heart className="w-8 h-8 text-navy mx-auto mb-3" />
                  <h4 className="font-bold mb-2">Casos Complejos</h4>
                  <p className="text-sm text-slate-600">Especialistas en desenredar pensiones alimenticias y litigios de custodia de alto conflicto.</p>
                </div>
              </div>

              <div className="bg-blue-50 border border-blue-100 rounded-xl p-8 italic text-slate-700">
                "Logró que mi proceso de divorcio, que pintaba para ser una guerra de años, se resolviera por mediación en pocos meses. Protegió mi patrimonio y sobre todo, la salud mental de mis hijos. Eternamente agradecida."
                <p className="mt-4 font-bold text-navy not-italic">— Cliente Anonimizada (Caso de Custodia en Mérida, 2023)</p>
              </div>
            </div>
          </section>

          {/* FINAL CTA & FOOTER */}
          <footer className="bg-slate-900 text-white pt-16 pb-8 px-4">
            <div className="max-w-3xl mx-auto text-center">
              <h2 className="text-3xl font-serif font-bold mb-6">Su tranquilidad no puede esperar a mañana.</h2>
              <p className="text-slate-400 mb-8">
                El tiempo suele agravar los conflictos familiares. Actúe hoy para tomar el control de su situación legal con expertos que lo respaldan en Mérida.
              </p>
              
              <button className="px-8 py-4 bg-navy border border-blue-400 hover:bg-blue-800 text-white font-bold rounded-lg shadow-lg transition-all duration-300 text-lg mb-12">
                Hablemos Hoy (Confidencialidad Absoluta)
              </button>
              
              <div className="border-t border-slate-800 pt-8 text-sm text-slate-500 flex flex-col md:flex-row justify-between items-center">
                <p>© 2024 Despacho Legal Familiar Mérida. Todos los derechos reservados.</p>
                <div className="flex gap-4 mt-4 md:mt-0">
                  <a href="#" className="hover:text-slate-300">Aviso de Privacidad</a>
                  <a href="#" className="hover:text-slate-300">Términos de Servicio</a>
                </div>
              </div>
            </div>
          </footer>

        </div>
      );
    }

    // Renderizado de React en el DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
